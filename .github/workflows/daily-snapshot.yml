name: Daily Snapshot

on:
  schedule:
    # 每天 06:00 UTC+8 = 22:00 UTC 前一天
    - cron: '0 22 * * *'
  workflow_dispatch: # 手动触发

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          pip install requests pillow
      
      - name: Run steam crawler
        run: |
          python scripts/steam_crawler.py
      
      - name: Run CCU snapshot
        run: |
          python scripts/snapshot_ccu.py
      
      - name: Run fetch developers
        run: |
          python scripts/fetch_developers.py
        continue-on-error: true
      
      - name: Run fetch rich data
        run: |
          python scripts/fetch_rich_data.py
        continue-on-error: true
      
      - name: Run potential calculator
        run: |
          python scripts/calc_potential.py
      
      - name: Run DBD crawler
        run: |
          python scripts/dbd_crawler.py
        continue-on-error: true
      
      - name: Run R.E.P.O. crawler
        run: |
          python scripts/repo_crawler.py
        continue-on-error: true
      
      - name: Run Chaoziran crawler
        run: |
          python scripts/chaoziran_crawler.py
        continue-on-error: true
      
      - name: Run DataValidator
        id: validate
        continue-on-error: true
        run: |
          python scripts/validate_data.py
      
      - name: Commit and push
        if: steps.validate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "chore: daily data snapshot $(date -u +%Y-%m-%d) [PASS]"
          git push
      
      - name: Commit failed validation (still push data, flag issues)
        if: steps.validate.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "chore: daily data snapshot $(date -u +%Y-%m-%d) [VALIDATION FAILED - check report]"
          git push
          echo "::warning::DataValidator 发现 ERROR,详见 docs/data/validation_report.json"
